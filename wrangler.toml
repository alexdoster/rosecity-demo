name = "rosecity-proxy"
main = "cloudflare-worker.js"
compatibility_date = "2026-01-01"

# Set secrets with:
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put DEMO_PASSWORD

# Native Workers rate limiting binding (no KV needed, no custom domain needed).
# 20 requests per 60s per unique key (see RATE_LIMIT_KEY logic in the worker) —
# generous for one real user typing questions, tight for a script hammering the endpoint.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }
